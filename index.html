<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBQ AI | HUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0a0a0c;
            color: #ffffff;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            width: 200%;
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .screen {
            width: 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at center, #16161a 0%, #0a0a0c 100%);
        }

        .glow-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .landing-content {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }

        .brand-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 50%, #aa7c11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 30px rgba(212, 175, 55, 0.2);
            margin-bottom: 5px;
            animation: pulseGlow 3s infinite alternate;
        }

        .brand-subtitle {
            font-size: 1.5rem;
            font-weight: 400;
            color: #8a8a93;
            letter-spacing: 6px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .lux-btn {
            background: linear-gradient(135deg, #1e1e24 0%, #111115 100%);
            border: 2px solid #d4af37;
            color: #ffffff;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(212, 175, 55, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .lux-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2), inset 0 0 15px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #25252d 0%, #16161a 100%);
        }

        .chat-header {
            width: 100%;
            height: 80px;
            background-color: #111114;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: absolute;
            top: 0;
            z-index: 10;
        }

        .header-right {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .header-subtitle {
            font-size: 0.8rem;
            color: #d4af37;
            font-weight: 700;
            margin-top: -2px;
        }

        .status-badge {
            background-color: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #2ecc71;
        }

        .status-badge.offline {
            background-color: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .status-badge.offline::before {
            background-color: #e74c3c;
            box-shadow: 0 0 8px #e74c3c;
        }

        .chat-body {
            width: 100%;
            flex: 1;
            margin-top: 80px;
            margin-bottom: 90px;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 900px;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background-color: #1e1e24;
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: fadeIn 0.4s ease forwards;
        }

        .message.user {
            align-self: flex-start;
        }

        .message.bot {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #25252d 0%, #1e1e24 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            color: #0a0a0c;
        }

        .msg-bubble {
            background-color: #131318;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 22px;
            border-radius: 18px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e4e4e7;
        }

        .message.bot .msg-bubble {
            border-color: rgba(212, 175, 55, 0.15);
            background-color: #16161d;
        }

        .code-block-container {
            margin-top: 15px;
            background-color: #09090b;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 650px;
        }

        .code-header {
            background-color: #121216;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .code-lang {
            font-size: 0.8rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 1px;
        }

        .copy-btn {
            background-color: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 5px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn:hover {
            background-color: #d4af37;
            color: #0a0a0c;
        }

        .code-content {
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            color: #a7a7a7;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
            overflow-x: auto;
        }

        .chat-footer {
            width: 100%;
            height: 90px;
            background-color: #0a0a0c;
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            z-index: 10;
        }

        .input-wrapper {
            width: 100%;
            max-width: 900px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            background-color: #131318;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 18px 25px;
            padding-left: 65px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .send-btn {
            position: absolute;
            left: 15px;
            background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0a0c;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #8a8a93;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .header-left-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2)); }
            100% { filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-container" id="mainContainer">
        
        <div class="screen">
            <div class="glow-overlay"></div>
            <div class="landing-content">
                <h1 class="brand-title">TBQ AI</h1>
                <p class="brand-subtitle">TBQ | HUB</p>
                <button class="lux-btn" onclick="navigateToChat()">
                    التحدث مع TBQ AI | 👤
                </button>
            </div>
        </div>

        <div class="screen">
            <div class="chat-header">
                <div class="header-right">
                    <h2 class="header-title">TBQ AI</h2>
                    <span class="header-subtitle">TBQ | HUB</span>
                </div>
                <div class="header-left-side">
                    <div class="status-badge" id="statusBadge" onclick="toggleStatus()">متصل</div>
                    <button class="back-btn" onclick="navigateToLanding()">رجوع</button>
                </div>
            </div>

            <div class="chat-body" id="chatBody">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="msg-bubble">
                        مرحباً بك في تكنولوجيا TBQ AI سيدي اللورد. أنا تحت خدمتك بالكامل، كيف يمكنني مساعدتك اليوم؟
                    </div>
                </div>
            </div>

            <div class="chat-footer">
                <div class="input-wrapper">
                    <input type="text" class="chat-input" id="userInput" placeholder="اسأل TBQ AI عن أي شيء أو اطلب سكربت..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="processMessage()">⚡</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const mainContainer = document.getElementById('mainContainer');
        const chatBody = document.getElementById('chatBody');
        const userInput = document.getElementById('userInput');
        const statusBadge = document.getElementById('statusBadge');

        let isOnline = true;

        function navigateToChat() {
            mainContainer.style.transform = 'translateX(50%)';
        }

        document.documentElement.style.setProperty('--direction', 'rtl');
        if(window.location.hash === '#chat') {
            navigateToChat();
        }

        function navigateToLanding() {
            mainContainer.style.transform = 'translateX(0)';
        }

        function toggleStatus() {
            isOnline = !isOnline;
            if (isOnline) {
                statusBadge.textContent = "متصل";
                statusBadge.classList.remove('offline');
            } else {
                statusBadge.textContent = "غير متصل";
                statusBadge.classList.add('offline');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                processMessage();
            }
        }

        function processMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user', '👤');
            userInput.value = '';

            setTimeout(() => {
                if (!isOnline) {
                    appendMessage("أنا غير متصل بالخادم حالياً. يرجى تحويل حالتي إلى متصل لتلقي الإجابات الفورية.", 'bot', '🤖');
                    return;
                }
                generateAIResponse(text);
            }, 100); 
        }

        function appendMessage(text, sender, avatarIcon) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);

            const avatar = document.createElement('div');
            avatar.classList.add('avatar');
            avatar.textContent = avatarIcon;

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            bubble.textContent = text;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
            return messageDiv;
        }

        function generateAIResponse(userText) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', 'bot');

            const avatar = document.createElement('div');
            avatar.classList.add('avatar');
            avatar.textContent = '🤖';

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatBody.appendChild(messageDiv);

            if (userText.includes('سكربت') || userText.toLowerCase().includes('script') || userText.includes('كود')) {
                bubble.textContent = "تفضل سيدي اللورد، هذا هو السكربت الذي طلبته بدقة عالية وسرعة فائقة:";
                
                let codeTemplate = `local Rayfield = loadstring(game:HttpGet('https://sirius.menu/rayfield'))()\nlocal Window = Rayfield:CreateWindow({\n   Name = "TBQ HUB V1",\n   LoadingTitle = "TBQ AI System",\n   LoadingSubtitle = "by TBQ",\n   ConfigurationSaving = { Enabled = false }\n})\n\nlocal Tab = Window:CreateTab("Main Cheats", 4483362458)\n\nTab:CreateButton({\n   Name = "Speed Boost",\n   Callback = function()\n       game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 100\n   end,\n})`;
                
                if(userText.includes('بلوكس فروت') || userText.includes('bloxfruit')) {
                    codeTemplate = `local Rayfield = loadstring(game:HttpGet('https://sirius.menu/rayfield'))()\nlocal Window = Rayfield:CreateWindow({\n   Name = "TBQ HUB | Blox Fruits",\n   LoadingTitle = "Auto Farm Premium",\n   LoadingSubtitle = "by TBQ AI",\n   ConfigurationSaving = { Enabled = false }\n})\n\nlocal Tab = Window:CreateTab("Main Farm", 4483362458)\nTab:CreateToggle({\n   Name = "Auto Farm Level",\n   CurrentValue = false,\n   Callback = function(Value)\n       _G.AutoFarm = Value\n       while _G.AutoFarm do\n           task.wait()\n           -- Premium Auto Farm Logic Here\n       end\n   end,\n})`;
                }

                const codeContainer = document.createElement('div');
                codeContainer.classList.add('code-block-container');

                const codeHeader = document.createElement('div');
                codeHeader.classList.add('code-header');

                const codeLang = document.createElement('span');
                codeLang.classList.add('code-lang');
                codeLang.textContent = userText.includes('بايثون') || userText.toLowerCase().includes('python') ? 'PYTHON' : 'LUA / LUAU';

                if(userText.includes('بايثون') || userText.toLowerCase().includes('python')) {
                    codeTemplate = `print("TBQ AI System Connected")\nprint("Executing secure protocol...")\nprint("Access granted to TBQ HUB")\nprint("Operation completed successfully.")`;
                }

                const copyBtn = document.createElement('button');
                copyBtn.classList.add('copy-btn');
                copyBtn.textContent = 'نسخ';
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(codeTemplate);
                    copyBtn.textContent = 'تم النسخ!';
                    copyBtn.style.borderColor = '#2ecc71';
                    copyBtn.style.color = '#2ecc71';
                    setTimeout(() => {
                        copyBtn.textContent = 'نسخ';
                        copyBtn.style.borderColor = 'rgba(212, 175, 55, 0.3)';
                        copyBtn.style.color = '#d4af37';
                    }, 2000);
                };

                codeHeader.appendChild(codeLang);
                codeHeader.appendChild(copyBtn);

                const codeContent = document.createElement('pre');
                codeContent.classList.add('code-content');
                codeContent.textContent = codeTemplate;

                codeContainer.appendChild(codeHeader);
                codeContainer.appendChild(codeContent);
                bubble.appendChild(codeContainer);
            } else {
                if (userText.includes('مين انت') || userText.includes('من انت') || userText.includes('اسمك')) {
                    bubble.textContent = "أنا نظام TBQ AI الذكي والمساعد الافتراضي الخاص بك في منصة TBQ | HUB. تم تصميمي لأكون خارق الذكاء، سريع الاستجابة، وملبي لجميع طلباتك البرمجية والتقنية فوراً.";
                } else if (userText.includes('هلا') || userText.includes('مرحبا') || userText.includes('السلام عليكم')) {
                    bubble.textContent = "مرحباً بك سيدي اللورد! كيف يمكن لذكاء TBQ AI أن يخدمك الآن؟ أنا جاهز تماماً لتلبية أوامرك.";
                } else {
                    bubble.textContent = `لقد قمت بتحليل استفسارك بدقة عالية: "${userText}". بصفتي TBQ AI، أؤكد لك أنني قادر على معالجة هذا الأمر بأعلى كفاءة وتوفير الحلول الذكية والسكربتات المتقدمة فوراً بناءً على توجيهاتك الفخمة سيدي اللورد.`;
                }
            }

            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }
    </script>
</body>
</html>
