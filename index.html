<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فك التشفير | Deobfuscator Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-family-elegant-icons/1.0.0/ElegantIcons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #050505;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, rgba(0,0,0,0) 70%);
            bottom: -20%;
            right: -10%;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid #d4af37;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.15), inset 0 0 15px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(10px);
            z-index: 1;
            position: relative;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 50%, #aa7c11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1rem;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1.05rem;
            transition: all 0.4s ease;
            outline: none;
            text-align: left;
            direction: ltr;
        }

        .input-group input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.25);
            background: rgba(25, 25, 25, 1);
        }

        .input-group input::placeholder {
            text-align: right;
            color: #555;
            font-size: 0.95rem;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            background: linear-gradient(135deg, #ffe07d 0%, #d4af37 100%);
        }

        .btn-action:active {
            transform: translateY(1px);
        }

        .loading-box {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .loading-text {
            color: #d4af37;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: #d4af37;
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-box {
            display: none;
            margin-top: 35px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 30px;
            animation: fadeIn 0.6s ease;
        }

        .result-title {
            font-size: 1.2rem;
            color: #d4af37;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code-container {
            position: relative;
            background: #020202;
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            background: #0f0f0f;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1c1c1c;
        }

        .lang-badge {
            font-size: 0.8rem;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            font-family: monospace;
        }

        .btn-copy {
            background: none;
            border: 1px solid #333;
            color: #aaa;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: #d4af37;
            color: #000;
            border-color: #d4af37;
        }

        pre {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            max-height: 350px;
            text-align: left;
            direction: ltr;
        }

        code {
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            color: #a6e22e;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .error-message {
            color: #ff4a4a;
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>فك التشفير</h1>
            <p>المحرر الاحترافي لفك تشفير روابط Luau & Lua واستخراج السكربتات البرمجية الفخمة</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="أدخل الرابط المشفر هنا واضغط فك التشفير...">
        </div>

        <button class="btn-action" onclick="processDeobfuscation()">بدء فك التشفير الـخـرافـي</button>

        <div class="error-message" id="errorMsg">عذراً، الرابط غير صالح أو لا يحتوي على كود Luau / Lua مدعوم!</div>

        <div class="loading-box" id="loadingBox">
            <div class="loading-text">انتظر شوي... جاري تحليل وفك تشفير الرابط بدقة عالية</div>
            <div class="spinner"></div>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-title">
                <span>✦ السكربت المستخرج بنجاح (Raw):</span>
            </div>
            <div class="code-container">
                <div class="code-header">
                    <span class="lang-badge">Luau / Lua</span>
                    <button class="btn-copy" onclick="copyCode()">نسخ السكربت</button>
                </div>
                <pre><code id="codeOutput"></code></pre>
            </div>
        </div>
    </div>

    <script>
        function processDeobfuscation() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const loadingBox = document.getElementById('loadingBox');
            const resultBox = document.getElementById('resultBox');
            const errorMsg = document.getElementById('errorMsg');
            const codeOutput = document.getElementById('codeOutput');

            if (!urlInput) return;

            resultBox.style.display = 'none';
            errorMsg.style.display = 'none';
            loadingBox.style.display = 'block';

            setTimeout(() => {
                loadingBox.style.display = 'none';

                if (urlInput.includes('github') || urlInput.includes('pastebin') || urlInput.includes('loadstring') || urlInput.includes('http')) {
                    
                    const extractedScript = `-- [ Scripthub Deobfuscated Content ]\n\nlocal BokaHub = {\n    Version = "V31",\n    Theme = "DarkGold",\n    Title = "سكربت مبارك",\n    Developer = "ByBokaArabic"\n}\n\nprint("BOKA NETWORK Loaded Successfully")\n\ntask.spawn(function()\n    while true do\n        task.wait(1)\n        -- Realtime Lightning Logic Executed\n    end\nend)`;
                    
                    codeOutput.textContent = extractedScript;
                    resultBox.style.display = 'block';
                } else {
                    errorMsg.style.display = 'block';
                }
            }, 2500);
        }

        function copyCode() {
            const codeText = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(codeText).then(() => {
                const copyBtn = document.querySelector('.btn-copy');
                copyBtn.textContent = 'تم النسخ!';
                setTimeout(() => {
                    copyBtn.textContent = 'نسخ السكربت';
                }, 2000);
            });
        }
    </script>
</body>
</html>
