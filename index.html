<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOKA</title>

<link rel="icon" href="https://i.ibb.co/Mqrzhbr/IMG-3020.jpg">
<link rel="apple-touch-icon" href="https://i.ibb.co/Mqrzhbr/IMG-3020.jpg">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0b0b0b">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Cairo',sans-serif;
    user-select:none;
}

body{
    background-color: #0b0b0b;
    color:#5a5a5a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    padding:40px 20px;
    position:relative;
}

body::-webkit-scrollbar{
    width:0;
}

.background-glow{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:800px;
    height:800px;
    background:radial-gradient(circle, rgba(255, 59, 59, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
    filter:blur(80px);
    z-index:-1;
    pointer-events:none;
}

#home-page{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1.2fr;
    align-items:center;
    min-height:80vh;
    gap:40px;
    padding:20px;
}

.nav-btn-container{
    position:absolute;
    top:30px;
    left:30px;
    z-index:100;
    display:flex;
    gap:15px; 
}

.btn-nav-decode, .btn-nav-install {
    background:#160d0d;
    border: 1px solid #160d0d;
    color:#ffffff;
    padding:14px 28px;
    font-size:1.1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    box-shadow: 0 0 15px rgba(255, 59, 59, 0.3);
    display:flex;
    align-items:center;
    gap:10px;
    border-radius:14px;
}

.btn-nav-decode span{
    display:inline-block;
    transform:rotate(-15deg);
    color:#ff3b3b;
    font-family:monospace;
}


.btn-nav-install svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #ff3b3b;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.btn-nav-decode:hover, .btn-nav-install:hover{
    background:#221515;
    box-shadow: 0 0 25px rgba(255, 59, 59, 0.5);
    transform:translateY(-2px);
}

.home-content{
    text-align:right;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.home-title{
    font-size:4rem;
    font-weight:900;
    line-height:1.1;
}

.home-title span.sub{
    display:block;
    font-size:2.5rem;
    color:#a0a0a0;
}

.home-title span.main-name{
    color: #ff3b3b;
    font-size:5.5rem;
    letter-spacing:2px;
    text-shadow: 0 0 35px rgba(255, 59, 59, 0.5);
}

.divider-line{
    width:100%;
    height:2px;
    background: linear-gradient(90deg, transparent, #ff3b3b, transparent);
    margin:10px 0;
}

.home-description{
    font-size:1.2rem;
    color:#a0a0a0;
    line-height:1.8;
    max-width:550px;
}

.stats-container{
    display:flex;
    gap:50px;
    margin-top:30px;
}

.stat-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
}

.stat-number{
    font-size:2.5rem;
    font-weight:900;
    color:#ff3b3b;
    text-shadow: 0 0 15px rgba(255, 59, 59, 0.2);
}

.stat-label{
    font-size:0.9rem;
    color:#a0a0a0;
}

.home-visuals{
    position:relative;
    height:400px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.floating-icon{
    position:absolute;
    background:#160d0d;
    border-radius:18px;
    width:75px;
    height:75px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 10px 25px rgba(255, 59, 59, 0.25);
    backdrop-filter:blur(10px);
    animation:rotate360 8s linear infinite;
}

.floating-icon svg{
    width:32px;
    height:32px;
    fill:none;
    stroke:#ff3b3b;
    stroke-width:2;
}

.icon-code{
    top:15%;
    right:25%;
    animation-duration:10s;
}

.icon-terminal{
    bottom:20%;
    right:40%;
    animation-duration:7s;
}

.icon-shield{
    bottom:25%;
    right:10%;
    animation-duration:9s;
}

@keyframes rotate360{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

#decode-page{
    display:none;
    width:100%;
    max-width:850px;
    animation:fadeIn 0.5s ease forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.main-container{
    width:100%;
    background: rgba(10, 10, 10, 0.92);
    border:1px solid #2a0f0f;
    border-radius:24px;
    box-shadow:0 15px 45px rgba(255,59,59,0.08);
    backdrop-filter:blur(20px);
    padding:40px;
    text-align:center;
    position:relative;
    margin-bottom:50px;
}

h1{
    font-size:3rem;
    font-weight:900;
    margin-bottom:30px;
    color:#ff3b3b;
    text-shadow:0 0 20px rgba(255, 59, 59, 0.25);
    letter-spacing:1px;
}

.input-group{
    position:relative;
    width:100%;
    margin-bottom:25px;
}

input[type="text"]{
    width:100%;
    padding:18px 25px;
    background:#120909;
    border:1px solid #2a0f0f;
    outline:none;
    color:#ffffff;
    font-size:1.1rem;
    text-align:left;
    direction:ltr;
    box-shadow:inset 0 0 8px rgba(0,0,0,0.25);
    transition:0.4s;
    border-radius:14px;
    user-select:text;
}

input[type="text"]:focus{
    border-color:#ff3b3b;
    box-shadow:0 0 20px rgba(255, 59, 59, 0.15);
}

input[type="text"]::placeholder{
    text-align:right;
    direction:rtl;
    color:#a0a0a0;
}

.btn-action{
    width:100%;
    padding:16px;
    font-size:1.3rem;
    font-weight:700;
    color:#fff;
    background:#160d0d;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(255, 59, 59, 0.2);
    transition:0.4s;
    border-radius:14px;
}

.btn-action:hover{
    transform:translateY(-3px);
    background:#221515;
    box-shadow:0 15px 35px rgba(255, 59, 59, 0.35);
}

.status-msg{
    font-size:1.4rem;
    font-weight:700;
    margin-top:25px;
    min-height:35px;
    color:#ff3b3b;
    display:none;
}

.output-box{
    margin-top:35px;
    width:100%;
    display:none;
    opacity:0;
    transform:translateY(20px);
    transition:0.5s;
}

.output-box.show{
    display:block;
    opacity:1;
    transform:translateY(0);
}

.code-container{
    width:100%;
    max-height:400px;
    overflow-y:auto;
    background:#0f0a0a;
    border:1px solid #2a0f0f;
    padding:20px;
    text-align:left;
    direction:ltr;
    margin-bottom:20px;
    border-radius:18px;
    box-shadow:inset 0 0 25px rgba(0,0,0,0.6);
}

.code-container pre{
    margin:0;
    white-space:pre-wrap;
    word-break:break-all;
}

.code-container code{
    font-family:'Consolas','Courier New',monospace;
    color:#ffffff;
    font-size:1rem;
    line-height:1.5;
}

.btn-copy{
    width:100%;
    padding:15px;
    font-size:1.2rem;
    font-weight:700;
    color:#fff;
    background:#ff3b3b;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(255, 59, 59, 0.3);
    transition:0.4s;
    border-radius:14px;
    margin-top:10px;
}

.btn-copy:hover{
    transform:translateY(-3px);
    background:#e02424;
    box-shadow:0 15px 30px rgba(255, 59, 59, 0.5);
}

@media(max-width:768px){

    #home-page{
        grid-template-columns:1fr;
        text-align:center;
        margin-top:90px; 
    }

    .home-content{
        text-align:center;
        align-items:center;
    }

    .stats-container{
        justify-content:center;
        gap:30px;
    }

    .home-visuals{
        height:200px;
    }

    .icon-code{
        top:10%;
        right:70%;
    }

    .icon-terminal{
        bottom:10%;
        right:45%;
    }

    .icon-shield{
        bottom:20%;
        right:20%;
    }

    .nav-btn-container{
        width:100%;
        left:0;
        top:15px;
        display:flex;
        justify-content:center;
        gap:10px;
        padding: 0 15px;
    }
    
    .btn-nav-decode, .btn-nav-install {
        padding: 10px 18px;
        font-size: 0.95rem;
        flex: 1;
        justify-content: center;
    }
}
</style>
</head>

<body>

<div class="background-glow"></div>

<div class="nav-btn-container" id="navContainer">
    <button class="btn-nav-install" id="installBtn" onclick="triggerInstallation()">
        تثبيت التطبيق 
        <svg viewBox="0 0 24 24">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <line x1="12" y1="18" x2="12.01" y2="18"></line>
        </svg>
    </button>
    
    <button class="btn-nav-decode" onclick="showDecodePage()">
        فك الروابط <span>&lt;_</span>
    </button>
</div>

<section id="home-page">

<div class="home-visuals">

<div class="floating-icon icon-code">
<svg viewBox="0 0 24 24">
<path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/>
</svg>
</div>

<div class="floating-icon icon-terminal">
<svg viewBox="0 0 24 24">
<path d="M4 17l6-6-6-6M12 19h8"/>
</svg>
</div>

<div class="floating-icon icon-shield">
<svg viewBox="0 0 24 24">
<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
</svg>
</div>

</div>

<div class="home-content">

<h1 class="home-title">
<span class="sub">فـريـق</span>
<span class="main-name">BOKA</span>
</h1>

<div class="divider-line"></div>

<p class="home-description">
نحن فريق BOKA نسوي هاكات ومواقع وسكربتات ونساعدكم وبس
</p>

<div class="stats-container">

<div class="stat-item">
<span class="stat-number">2</span>
<span class="stat-label">أعضاء الفريق</span>
</div>

<div class="stat-item">
<span class="stat-number" id="counter">+1</span>
<span class="stat-label">عضو في ديسكورد</span>
</div>

<div class="stat-item">
<span class="stat-number">2</span>
<span class="stat-label">الإصدار</span>
</div>

</div>
</div>
</section>

<section id="decode-page">

<div class="main-container">

<h1>تفكيك الروابط</h1>

<div class="input-group">

<input
type="text"
id="urlInput"
placeholder="حط الرابط هنا..."
autocomplete="off"
autocorrect="off"
autocapitalize="off"
spellcheck="false"
>

</div>

<button
type="button"
class="btn-action"
id="actionBtn"
onclick="processLink()"
>
فك الرابط
</button>

<div class="status-msg" id="statusMessage">
انتظر شوي…
</div>

<div class="output-box" id="outputBox">

<div class="code-container">
<pre><code id="codeArea"></code></pre>
</div>

<button
type="button"
class="btn-copy"
id="copyBtn"
onclick="copyCode()"
>
نسخ السكربت
</button>

</div>
</div>
</section>

<script>

let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    
    e.preventDefault();
    
    deferredPrompt = e;
});

function triggerInstallation() {
    if (deferredPrompt) {
        
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('تم قبول تثبيت التطبيق بنجاح');
            }
            deferredPrompt = null;
        });
    } else {
        
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
            alert('لتثبيت التطبيق على الآيفون: اضغط على زر "مشاركة" أسفل المتصفح ثم اختر "إضافة إلى الشاشة الرئيسية"');
        } else {
            alert('التطبيق مثبت بالفعل أو أن متصفحك لا يدعم التثبيت المباشر حالياً.');
        }
    }
}


if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed', err));
    });
}


window.addEventListener('DOMContentLoaded',()=>{
    const counterElement=document.getElementById('counter');
    let currentCount=1;
    const targetCount=100;
    const duration=1500;
    const stepTime=Math.max(Math.floor(duration/targetCount), 6);

    const timer=setInterval(()=>{
        currentCount++;
        counterElement.innerText="+"+currentCount;
        if(currentCount>=targetCount){
            clearInterval(timer);
        }
    },stepTime);
});

function showDecodePage(){
    document.getElementById('home-page').style.display='none';
    document.getElementById('navContainer').style.display='none';
    document.getElementById('decode-page').style.display='block';
    window.scrollTo(0,0);
}

const urlInput=document.getElementById('urlInput');
const statusMessage=document.getElementById('statusMessage');
const outputBox=document.getElementById('outputBox');
const codeArea=document.getElementById('codeArea');
const copyBtn=document.getElementById('copyBtn');

urlInput.addEventListener('paste',(e)=>{
    e.preventDefault();
    const pastedText=(e.clipboardData||window.clipboardData).getData('text');
    urlInput.value=pastedText.trim();
});

urlInput.addEventListener('drop',(e)=>{ e.preventDefault(); });

function processLink(){
    const urlValue=urlInput.value.trim();
    if(urlValue==="") return;
    outputBox.classList.remove('show');
    setTimeout(()=>{ outputBox.style.display='none'; },500);
    statusMessage.style.color='#ff3b3b';
    statusMessage.innerText="انتظر شوي…";
    statusMessage.style.display="block";

    setTimeout(()=>{
        const isRaw= urlValue.includes('raw')|| urlValue.includes('pastebin.com/raw')|| urlValue.includes('githubusercontent.com');
        if(!isRaw){ showError(); return; }
        fetch(urlValue)
        .then(response=>{
            if(!response.ok) throw new Error('Network error');
            return response.text();
        })
        .then(data=>{
            const cleanData=data.trim();
            if(cleanData===""|| (!cleanData.includes('function')&& !cleanData.includes('local')&& !cleanData.includes('end')&& !cleanData.includes('print'))){
                showError();
            }else{
                statusMessage.style.display="none";
                codeArea.innerText=cleanData;
                outputBox.style.display='block';
                setTimeout(()=>{ outputBox.classList.add('show'); },50);
            }
        })
        .catch(()=>{ showError(); });
    },1200);
}

function showError(){
    statusMessage.style.color='#ff1e1e';
    statusMessage.innerText="Error : 404";
    setTimeout(()=>{ statusMessage.style.display="none"; urlInput.value=""; },2500);
}

function copyCode(){
    const textToCopy=codeArea.innerText;
    navigator.clipboard.writeText(textToCopy).then(()=>{
        const originalText=copyBtn.innerText;
        copyBtn.innerText="تم النسخ";
        setTimeout(()=>{ copyBtn.innerText=originalText; },2000);
    });
}
</script>

</body>
</html>
