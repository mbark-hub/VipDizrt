<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBQ AI | HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0b0c10;
            color: #eceff1;
            overflow-x: hidden;
        }

        /* خلفية جمالية متطورة */
        .bg-glow {
            position: fixed;
            top: -150px;
            right: -150px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 75, 75, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* الهيدر الفخم */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .logo-sub {
            font-size: 12px;
            font-weight: 700;
            color: #ff4b4b;
            letter-spacing: 2px;
            margin-top: -4px;
        }

        /* زر الحالة التفاعلي */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
        }

        .status-text {
            font-size: 14px;
            font-weight: 700;
            color: #2ecc71;
        }

        /* عند تحويل الحالة إلى غير متصل */
        .status-badge.offline .status-dot {
            background-color: #e74c3c;
            box-shadow: 0 0 8px #e74c3c;
        }
        .status-badge.offline .status-text {
            color: #e74c3c;
        }

        /* الواجهة الرئيسية للموقع */
        .hero-section {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .hero-title {
            font-size: 55px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffffff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: 18px;
            color: #8a8d93;
            max-width: 600px;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.8;
        }

        /* الزر الكبير الفخم */
        .cta-button {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #ff4b4b 0%, #c32c2c 100%);
            color: white;
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 75, 75, 0.3);
            transition: all 0.3s transform, box-shadow 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(255, 75, 75, 0.5);
        }

        /* قسم الشات الذكي الفخم */
        .chat-section {
            min-height: 100vh;
            padding: 60px 8%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: #12131c;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            height: 650px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* نمط الرسائل */
        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: fadeIn 0.4s ease forwards;
        }

        .message.user {
            align-self: flex-start;
        }

        .message.bot {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .avatar {
            background: #20222e;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bot .avatar {
            background: #ff4b4b;
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.4);
        }

        .msg-bubble {
            background: #1a1c28;
            padding: 16px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            line-height: 1.7;
            font-size: 15px;
        }

        .bot .msg-bubble {
            background: #1e1f29;
            border-left: 3px solid #ff4b4b;
        }

        /* صندوق الكود الفخم مع زر النسخ */
        .code-block-container {
            margin-top: 12px;
            background: #090a0f;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            width: 100%;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #141622;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .code-lang {
            font-size: 12px;
            font-weight: 700;
            color: #8a8d93;
            text-transform: uppercase;
        }

        .copy-btn {
            background: rgba(255, 75, 75, 0.1);
            color: #ff4b4b;
            border: 1px solid rgba(255, 75, 75, 0.2);
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #ff4b4b;
            color: white;
        }

        .code-content {
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #a9b2c3;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        /* شريط الإدخال السفلي */
        .chat-input-area {
            padding: 20px;
            background: #161722;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            background: #0f1016;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 20px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #ff4b4b;
        }

        .send-btn {
            background: #ff4b4b;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #e03e3e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* مظهر شريط التمرير الفخم */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #20222e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff4b4b;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo-container">
            <span class="logo-main">TBQ AI</span>
            <span class="logo-sub">TBQ | HUB</span>
        </div>
        
        <div class="status-badge" id="statusToggle" onclick="toggleStatus()">
            <div class="status-dot"></div>
            <span class="status-text" id="statusText">متصل</span>
        </div>
    </header>

    <section class="hero-section">
        <h1 class="hero-title">الجيل القادم من الذكاء الاصطناعي</h1>
        <p class="hero-desc">نظام متطور مصمم خصيصاً لابتكار الحلول الذكية، برمجة السكربتات، وإدارة الأنظمة الروبوتية الفخمة بسرعة فائقة كلياً.</p>
        <a href="#chatContainer" class="cta-button">التحدث مع TBQ AI | 👤</a>
    </section>

    <section class="chat-section">
        <div class="chat-container" id="chatContainer">
            <div class="chat-messages" id="chatMessages">
                
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="msg-bubble">
                        مرحباً بك في واجهة TBQ AI الذكية. كيف يمكنني مساعدتك برمجياً اليوم؟
                    </div>
                </div>

            </div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="userInput" placeholder="اكتب سؤالك أو اطلب سكربت الآن..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </section>

    <script>
        // نظام تبديل الحالة (متصل / غير متصل) عند الضغط على الزر في الهيدر
        let isOnline = true;
        function toggleStatus() {
            const badge = document.getElementById('statusToggle');
            const text = document.getElementById('statusText');
            
            isOnline = !isOnline;
            
            if (isOnline) {
                badge.classList.remove('offline');
                text.innerText = 'متصل';
            } else {
                badge.classList.add('offline');
                text.innerText = 'غير متصل';
            }
        }

        // التعامل مع ضغط زر إنتر للإرسال
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // نظام إرسال الرسائل ورد السكربت الذكي الفوري المماثل لـ Gemini
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // 1. إضافة رسالة المستخدم للشاشة
            appendMessage(text, 'user', '👤');
            input.value = '';

            // تحقق إذا كان البوت غير متصل لتنبيه المستخدم
            if (!isOnline) {
                setTimeout(() => {
                    appendMessage('النظام حالياً غير متصل بالخادم، فضلاً قم بتحويل الحالة إلى "متصل" لإرسال الأوامر.', 'bot', '🤖');
                }, 400);
                return;
            }

            // 2. الرد الفوري فائق السرعة بناء على الكلمة المفتاحية (سكربت)
            setTimeout(() => {
                if (text.includes('سكربت') || text.includes('كود') || text.includes('script') || text.includes('python')) {
                    appendBotCodeResponse();
                } else {
                    appendMessage('تحت خدمتك سيدي، تم استقبال أمرك وجاري العمل عليه بأعلى دقة ومعالجة كأحدث أنظمة الروبوتات.', 'bot', '🤖');
                }
            }, 350); // سرعة استجابة فائقة جدًا
        }

        // دالة لطباعة الرسائل النصية العادية
        function appendMessage(text, sender, icon) {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = `
                <div class="avatar">${icon}</div>
                <div class="msg-bubble">${text}</div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // دالة إنشاء صندوق الكود الاحترافي مع زر النسخ الجاهز
        function appendBotCodeResponse() {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            
            // نص الكود البرمجي الافتراضي النظيف تماماً بدون تعليقات داخلية
            const codeText = `import time\n\ndef init_robot_protocol():\n    print("TBQ AI System Initialized...")\n    time.sleep(1)\n    print("Connecting to TBQ HUB Server...")\n    print("Status: Active - Full Speed Power Generated.")\n\ninit_robot_protocol()`;

            msgDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="msg-bubble">
                    أبشر سيدي، إليك السكربت البرمجي الفخم المطلوب متوافق وجاهز للتشغيل فوراً:
                    <div class="code-block-container">
                        <div class="code-header">
                            <span class="code-lang">python</span>
                            <button class="copy-btn" onclick="copyCode(this)">نسخ</button>
                        </div>
                        <div class="code-content">${escapeHtml(codeText)}</div>
                    </div>
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // ميزة نسخ الكود البرمجي بضغطة زر وتغيير النص لتأكيد النسخ
        function copyCode(button) {
            const codeContent = button.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(codeContent).then(() => {
                button.innerText = 'تم النسخ !';
                button.style.background = '#2ecc71';
                button.style.color = '#fff';
                button.style.borderColor = '#2ecc71';
                
                setTimeout(() => {
                    button.innerText = 'نسخ';
                    button.style.background = 'rgba(255, 75, 75, 0.1)';
                    button.style.color = '#ff4b4b';
                    button.style.borderColor = 'rgba(255, 75, 75, 0.2)';
                }, 2000);
            });
        }

        // دالة حماية النصوص البرمجية لضمان عدم تداخلها مع الـ HTML
        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
