<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يستخرج لك السكربت الي داخل الرابط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 10%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 5%;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 750px;
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid #ffd700;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
            animation: glowPulse 4s infinite alternate;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); border-color: #ffd700; }
            100% { box-shadow: 0 0 45px rgba(255, 215, 0, 0.35); border-color: #ffea75; }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 30%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.1);
            margin-bottom: 5px;
        }

        .header p {
            color: #8c8c8c;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: left;
            direction: ltr;
        }

        .input-group input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
            background: rgba(25, 25, 25, 1);
        }

        .input-group i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffd700;
            font-size: 1.2rem;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700 0%, #b39700 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #ffea75 0%, #ffd700 100%);
        }

        .btn-action:active {
            transform: translateY(1px);
        }

        .loading-box {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .loading-text {
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            border-top-color: #ffd700;
            margin: 0 auto;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(300deg); }
        }

        .result-box {
            display: none;
            margin-top: 30px;
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
        }

        .result-title {
            color: #ffd700;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-copy {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: #ffd700;
            color: #000;
        }

        .code-area {
            width: 100%;
            height: 250px;
            background: #070707;
            border: 1px solid #151515;
            border-radius: 8px;
            color: #a6e22e;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            padding: 15px;
            resize: none;
            outline: none;
            direction: ltr;
            text-align: left;
            user-select: text;
        }

        .watermark {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #333;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>قوي جداّ</h1>
            <p>LUAU & LUA</p>
        </div>

        <div id="main-panel">
            <div class="input-group">
                <input type="text" id="target-url" placeholder="حط الرابط هنا..." autocomplete="off">
                <i class="fa-solid fa-link"></i>
            </div>
            <button class="btn-action" onclick="processExtraction()">بدء فك الرابط واستخراج السكربت</button>
        </div>

        <div class="loading-box" id="loader">
            <p class="loading-text">انتظر شوي…</p>
            <div class="spinner"></div>
        </div>

        <div class="result-box" id="result-panel">
            <div class="result-header">
                <div class="result-title">
                    <i class="fa-solid fa-code"></i>
                    <span>Luau / Lua Script Source</span>
                </div>
                <button class="btn-copy" onclick="copyScriptCode()">نسخ السكربت</button>
            </div>
            <textarea class="code-area" id="code-output" readonly></textarea>
        </div>

        <div class="watermark">من صنع مبارك</div>
    </div>

    <script>
        function processExtraction() {
            const urlInput = document.getElementById('target-url').value.trim();
            if (!urlInput) return;

            document.getElementById('main-panel').style.display = 'none';
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            let targetFetchUrl = urlInput;
            if (urlInput.includes('github.com') && !urlInput.includes('raw.githubusercontent.com')) {
                targetFetchUrl = urlInput.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            } else if (urlInput.includes('pastebin.com') && !urlInput.includes('/raw/')) {
                targetFetchUrl = urlInput.replace('pastebin.com/', 'pastebin.com/raw/');
            }

            setTimeout(() => {
                fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetFetchUrl)}`)
                    .then(response => {
                        if (response.ok) return response.json();
                        throw new Error('Network response error');
                    })
                    .then(data => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('result-panel').style.display = 'block';
                        document.getElementById('main-panel').style.display = 'block';
                        document.getElementById('code-output').value = data.contents;
                    })
                    .catch(err => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('result-panel').style.display = 'block';
                        document.getElementById('main-panel').style.display = 'block';
                        document.getElementById('code-output').value = `-- فشل جلب البيانات تلقائياً.\n-- الرابط المباشر (Raw):\n-- ${targetFetchUrl}`;
                    });
            }, 2500);
        }

        function copyScriptCode() {
            const codeArea = document.getElementById('code-output');
            codeArea.select();
            codeArea.setSelectionRange(0, 99999);
            document.execCommand('copy');
            
            const copyBtn = document.querySelector('.btn-copy');
            copyBtn.innerText = 'تم النسخ الرابط';
            setTimeout(() => {
                copyBtn.innerText = 'نسخ السكربت';
            }, 2000);
        }
    </script>

</body>
</html>
